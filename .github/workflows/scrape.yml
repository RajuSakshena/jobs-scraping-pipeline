name: Run All Job Scrapers

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"   # Daily at 2 AM UTC

concurrency:
  group: job-scraper
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      # 1️⃣ Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3️⃣ Install OS Dependencies (Required for Stealth/XVFB)
      - name: Install OS Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgbm-dev

      # 4️⃣ Install Python Dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-action.txt
          # Explicitly install stealth if not in requirements
          pip install playwright-stealth 

      # 🔥 5️⃣ Install Playwright Browsers with System Deps
      - name: Install Playwright Browsers
        run: |
          python -m playwright install chromium --with-deps

      # 🚀 6️⃣ Run Scraper with XVFB (The Fix for Detection)
      - name: Run Scrapers
        env:
          DISPLAY: :99
        run: |
          echo "Starting job scrapers in stealth mode..."
          # xvfb-run virtual display provide karta hai jo captcha bypass mein help karta hai
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
          python runner.py
          echo "Scraping completed successfully."

      # 📦 7️⃣ Upload Output as Artifact (Optional Debugging)
      - name: Upload Output Files
        if: always() # Success ho ya fail, screenshot/output mil jaye
        uses: actions/upload-artifact@v4
        with:
          name: job-scraper-output
          path: |
            output/
            debug_screenshot.png

      # 💾 8️⃣ Commit & Push Updated Excel
      - name: Commit & Push Combined.xlsx
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Ensure output directory exists
          mkdir -p output
          
          git add output/Combined.xlsx || true

          if git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "Auto update Combined.xlsx [$(date -u)]"
            git push
          fi
