name: Run All Job Scrapers

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"   # Daily at 2 AM UTC

concurrency:
  group: job-scraper
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    steps:
      # 1️⃣ Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3️⃣ Install Python Dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-action.txt

      # 🚀 4️⃣ Run Scraper (Simple Execution)
      - name: Run Scrapers
        run: |
          echo "Starting job scrapers..."
          python runner.py
          echo "Scraping completed successfully."

      # 📦 5️⃣ Upload Output (Optional)
      - name: Upload Output Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-scraper-output
          path: |
            output/
            debug_screenshot.png

      # 💾 6️⃣ Commit & Push Updated Excel
      - name: Commit & Push Combined.xlsx
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p output

          git add output/Combined.xlsx || true

          if git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "Auto update Combined.xlsx [$(date -u)]"
            git push
          fi
